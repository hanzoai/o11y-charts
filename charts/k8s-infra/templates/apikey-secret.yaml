{{- if and (not .Values.apiKeyExistingSecretName) .Values.o11yApiKey }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "k8s-infra.fullname" . }}-apikey-secret
  namespace: {{ include "k8s-infra.namespace" . }}
  labels:
    {{- include "k8s-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
data:
  o11y-apikey: {{ .Values.o11yApiKey | b64enc | quote }}
{{- end }}
