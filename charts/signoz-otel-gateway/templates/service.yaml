apiVersion: v1
kind: Service
metadata:
{{- if .Values.service.annotations }}
  annotations:
  {{- range $key, $value := .Values.service.annotations }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
  name: {{ include "o11y-otel-gateway.fullname" . }}
  labels:
    {{- include "o11y-otel-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- include "o11y-otel-gateway.ports" . | indent 4 }}
  selector:
    {{- include "o11y-otel-gateway.selectorLabels" . | nindent 4 }}
