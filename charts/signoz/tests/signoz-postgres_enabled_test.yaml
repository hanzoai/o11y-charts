suite: Test Hanzo O11y Environment Variables and Volumes if PostgreSQL chart enabled

templates:
  - templates/o11y/statefulset.yaml

release:
  name: o11y
  namespace: o11y

tests:
  - it: should render the Environment variables for PostgreSQL in o11y statefulset if postgresql.enabled=true
    set:
      postgresql:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_PROVIDER
              value: postgres
        template: templates/o11y/statefulset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            value: "o11y"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PORT
            value: "5432"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            value: "o11y123"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: "o11y"
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_POSTGRES_DSN
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@o11y-postgresql:$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable
        template: templates/o11y/statefulset.yaml

  - it: Hanzo O11y StatefulSet should NOT render volumeMounts when postgresql.enabled=true
    set:
      postgresql:
        enabled: true
      o11y:
        additionalVolumeMounts: []
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 0
        template: templates/o11y/statefulset.yaml

  - it: should render the Environment variables for PostgreSQL in o11y statefulset if postgresql.enabled=true and postgres.fullNameOverride
    set:
      postgresql:
        enabled: true
        fullnameOverride: "does-not-matter"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_PROVIDER
              value: postgres
        template: templates/o11y/statefulset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_POSTGRES_DSN
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@does-not-matter:$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable
        template: templates/o11y/statefulset.yaml
  
  - it: should render the Environment variables for PostgreSQL in o11y statefulset if postgresql.enabled=true and postgresql.nameOverride
    set:
      postgresql:
        enabled: true
        nameOverride: "does-not-matter"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_PROVIDER
              value: postgres
        template: templates/o11y/statefulset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content: 
              name: HANZO_SQLSTORE_POSTGRES_DSN
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@o11y-does-not-matter:$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable
        template: templates/o11y/statefulset.yaml