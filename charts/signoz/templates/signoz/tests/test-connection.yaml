apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "o11y.fullname" . }}-test-connection"
  labels:
    {{- include "o11y.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: {{ default "docker.io" .Values.global.imageRegistry }}/busybox:1.35
      command: ['wget']
      args: ['http://{{ include "o11y.url" . }}/api/v1/health?live=1']
      # NOTE: replace the path with version or healthcheck URL after the implementation
  restartPolicy: Never
