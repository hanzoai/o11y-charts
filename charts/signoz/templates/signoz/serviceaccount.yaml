{{- if .Values.o11y.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "o11y.serviceAccountName" . }}
  labels:
    {{- include "o11y.labels" . | nindent 4 }}
  {{- with .Values.o11y.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- include "o11y.imagePullSecrets" . }}
{{- end -}}
